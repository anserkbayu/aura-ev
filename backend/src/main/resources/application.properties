# ============================================
# AURA EV Application Configuration
# ============================================

# Server Configuration
# Railway/Render menyediakan PORT lewat env var otomatis; localhost tetap pakai 8080
server.port=${PORT:8080}

# Database Configuration (Supabase PostgreSQL)
# Nilai diambil dari Environment Variable (DB_URL, DB_USERNAME, DB_PASSWORD).
# Kalau env var belum diset (misal saat development di laptop), pakai nilai default setelah ":".
# PENTING: saat deploy ke Railway/Render, SET env var ini di dashboard hosting -
# jangan simpan password asli di file ini karena file ini akan ikut ter-push ke GitHub.
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres.yufbvyrxxkqsdtgbrqrh}
spring.datasource.password=${DB_PASSWORD:dbauraev30#1}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.auraev.api=DEBUG
